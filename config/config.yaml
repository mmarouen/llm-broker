backend:
  image:
    repository-name: 'cloud-run-repository'
    image-name: 'cloud-run-backend'
    dockerfile: 'Dockerfile'
  compute:
    ram: 2Gi
    cpu: 2
    timeout: 3600
models:
  llama-3.2-fastapi:
    image:
      repository-name: 'inference-repository'
      image-name: 'inference-image'
      dockerfile: 'Dockerfile.fastapi'
    registry-id: '8270003096596250624'
    storage:
      bucket: 'gcp-ml-models'
      relative-path: 'meta-llama-Llama-3.2-3B-Instruct'
    endpoint:
      name: 'Inf-endpt-llama3.2-3b-fastapi'
      id: '3631838639148761088'
      is-dedicated: true
    inference:
      max_model_length: 2048
      max_new_tokens: 600
  llama-3.2-vllm:
    image:
      repository-name: 'inference-repository'
      image-name: 'vllm-image'
      dockerfile: 'Dockerfile.vllm'
    registry-id: '3698286524861775872'
    storage:
      bucket: 'gcp-ml-models'
      relative-path: 'meta-llama-Llama-3.2-3B-Instruct'
    endpoint:
      name: 'Inf-endpt-llama3.2-3b-vllm'
      id: '5339547322852311040'
      is-dedicated: true
    inference:
      max_model_length: 2048
      max_new_tokens: 512